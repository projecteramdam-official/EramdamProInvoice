<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProInvoice - Payment Tracking & Invoice System</title>
    
    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Poppins:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700;900&family=Noto+Sans+Meetei+Mayek:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->

            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],

                        roboto: ['Roboto', 'sans-serif'],

                            800: '#1e40af',
                            900: '#1e3a8a',

            }

    <!-- html2pdf.js & QRCode.js (CDN) -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .a4-container { width: 794px; min-height: 1123px; margin: 0 auto; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); background-color: white; }
        .scale-wrapper { transform-origin: top center; transition: transform 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: fadeIn 0.2s ease-in-out; }
        .chevron { transition: transform 0.3s ease; }
        details[open] .chevron { transform: rotate(180deg); }
        .qr-box img { margin: 0 auto; }

</head>
<body class="bg-gray-50 font-sans text-gray-800 h-screen overflow-hidden flex flex-col relative">

        <main class="flex flex-1 overflow-hidden h-full">
            <section class="w-full lg:w-[480px] bg-white border-r border-gray-200 flex flex-col relative z-10 shadow-lg h-full">
                <div id="tab-switcher" class="flex border-b border-gray-100 shrink-0 bg-white">
                    <button id="btn-tab-invoice" onclick="setMode('invoice')" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest border-b-2 border-brand-600 text-brand-600">Invoice</button>
                    <button id="btn-tab-contract" onclick="setMode('contract')" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest border-b-2 border-transparent text-gray-400">Contract Generator</button>
                </div>

                <div class="flex-1 overflow-y-auto p-6 space-y-5 pb-48">
                    <!-- INVOICE FORM -->
                    <div id="invoice-form-section" class="space-y-5">
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Invoice Style</h2>
                            <div class="grid grid-cols-3 gap-3">
                                <label class="cursor-pointer">
                                    <input type="radio" name="style" value="basic" class="peer sr-only" onchange="updateState('style', this.value)">
                                    <div class="text-center p-2.5 border border-gray-200 rounded-lg peer-checked:border-brand-500 peer-checked:bg-brand-50 peer-checked:text-brand-600 bg-white"><div class="text-xs font-bold">Basic</div></div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="style" value="business" class="peer sr-only" onchange="updateState('style', this.value)">
                                    <div class="text-center p-2.5 border border-gray-200 rounded-lg peer-checked:border-brand-500 peer-checked:bg-brand-50 peer-checked:text-brand-600 bg-white"><div class="text-xs font-bold">Business</div></div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="style" value="modern" class="peer sr-only" onchange="updateState('style', this.value)">
                                    <div class="text-center p-2.5 border border-gray-200 rounded-lg peer-checked:border-brand-500 peer-checked:bg-brand-50 peer-checked:text-brand-600 bg-white"><div class="text-xs font-bold">Modern</div></div>
                                </label>
                            </div>
                        </div>
                        <div class="bg-gray-50 p-5 rounded-xl border border-gray-100">
                            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Invoice Basics</h2>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="invNum" placeholder="Invoice No." class="w-full text-sm font-bold border-gray-200 rounded-lg p-2.5" oninput="updateState('invNum', this.value)">
                                <input type="date" id="invDate" class="w-full text-sm font-bold border-gray-200 rounded-lg p-2.5" oninput="updateState('invDate', this.value)">
                            </div>
                            <div class="grid grid-cols-2 gap-4 mt-4">
                                <select id="paymentTerms" class="w-full text-sm font-bold border-gray-200 rounded-lg p-2.5" onchange="updateState('paymentTerms', this.value)">
                                    <option value="receipt">Due on Receipt</option>
                                    <option value="net3">Net 3 Days</option>
                                    <option value="net7" selected>Net 7 Days</option>
                                    <option value="net15">Net 15 Days</option>
                                </select>
                                <input type="number" id="lateFee" placeholder="Late Fee %" class="w-full text-sm font-bold border-gray-200 rounded-lg p-2.5" oninput="updateState('lateFee', parseFloat(this.value) || 0)">
                            </div>
                        </div>
                        <div class="bg-white border rounded-xl p-5">
                            <h2 class="text-xs font-bold uppercase tracking-widest mb-3">Client Details</h2>
                            <input type="text" id="cName" placeholder="Client Name" class="w-full text-sm font-medium border-gray-200 rounded-lg p-2.5 mb-2" oninput="updateState('cName', this.value)">
                            <textarea id="cAddress" placeholder="Client Address" class="w-full text-sm border-gray-200 rounded-lg p-2.5" oninput="updateState('cAddress', this.value)"></textarea>
                        </div>
                        <div id="items-container" class="space-y-3"></div>
                        <button onclick="addItem()" class="w-full py-3 border-2 border-dashed text-brand-600 bg-brand-50 rounded-lg text-sm font-bold">Add Item</button>
                        <div class="bg-gray-50 p-5 rounded-xl border">

                            <input type="text" id="fName" placeholder="Your Name/Brand" class="w-full text-sm font-medium border-gray-200 rounded-lg p-2.5 mb-2" oninput="updateState('fName', this.value)">
                            <input type="text" id="upiId" placeholder="UPI ID" class="w-full text-sm font-medium border-gray-200 rounded-lg p-2.5 mb-3" oninput="updateState('upiId', this.value)">
                            <div class="relative border-2 border-dashed p-5 text-center bg-white rounded-xl">

                            <input type="text" id="contractClient" placeholder="Client Legal Name" class="w-full text-sm font-bold border-gray-200 rounded-lg p-2.5 mb-3" oninput="updateState('contractClient', this.value)">

                        <button onclick="sendWhatsApp()" class="bg-[#25D366] text-white px-4 py-3 rounded-xl font-bold text-sm">WhatsApp</button>
                    </div>
                    <div id="contract-actions" class="hidden grid grid-cols-2 gap-3 mb-3">

                        <button onclick="sendWhatsApp()" class="bg-[#25D366] text-white px-4 py-3 rounded-xl font-bold text-sm">Send Contract</button>
                    </div>

        <!-- REMINDER MODAL -->

                    <h3>🔴 Overdue Reminders (Invoices)</h3>
                    <button onclick="closeNudgeModal()">✕</button>
                </div>
                <div class="p-6 space-y-3" id="nudge-modal-list"></div>

    <script>
        // --- HELPERS ---
        const formatINR = (a) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(a);
        const formatDate = (d) => d ? new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '';

        // --- PART 3: SMART REMINDER MESSAGE (REPLACE ENTIRE FUNCTION) ---
        function generateReminderMessage(record) {
            const clientName = record.cName || "Client";
            if (!record.dueDate) {
                return `Hi ${clientName}, Sharing invoice #${record.invNum}. Kindly review.`;
            }
            const now = new Date().setHours(0,0,0,0);
            const due = new Date(record.dueDate).setHours(0,0,0,0);
            const daysLate = Math.floor((now - due) / (1000 * 60 * 60 * 24));

            if (daysLate <= 0) {
                return `Hi ${clientName}, Just a reminder that invoice #${record.invNum} for ₹${record.total} is due on ${formatDate(record.dueDate)}. Please check when possible.`;
            }
            if (daysLate === 1) {
                return `Hi ${clientName}, Invoice #${record.invNum} (₹${record.total}) was due yesterday. Kindly update on payment.`;
            }
            if (daysLate === 2) {
                return `Hi ${clientName}, Following up on invoice #${record.invNum} (₹${record.total}), now 2 days overdue. Please process soon.`;
            }
            return `Hi ${clientName}, Invoice #${record.invNum} (₹${record.total}) is ${daysLate} days overdue. Please treat this as urgent.`;
        }

        // --- PART 4: QR GENERATION ---
        function generateReminderQR(record) {
            const message = generateReminderMessage(record);
            return `https://wa.me/?text=${encodeURIComponent(message)}`;
        }

        // --- STATE ---
        const defaultState = {
            style: 'basic', mode: 'invoice', lateFee: 0,
            invNum: 'INV-001', invDate: new Date().toISOString().split('T')[0], paymentTerms: 'net7', dueDate: '',
            fName: '', fEmail: '', fAddress: '', cName: '', cAddress: '', upiId: '', qrImage: null,
            items: [{ id: Date.now(), desc: 'Web Service', amount: 1000 }],
            savedInvoices: [], savedContracts: [],
            contractFreelancer: '', contractClient: '', contractDesc: '', contractAmount: 0, contractStart: '', contractEnd: ''
        };
        let state = { ...defaultState };
        let grandTotalToExport = 0;

        function updateState(k, v) { 
            state[k] = v; 
            if (k === 'invDate' || k === 'paymentTerms') {
                const d = new Date(state.invDate);
                let days = 7;
                if(state.paymentTerms==='net3') days=3; else if(state.paymentTerms==='net15') days=15; else if(state.paymentTerms==='receipt') days=0;
                d.setDate(d.getDate()+days);
                state.dueDate = d.toISOString().split('T')[0];
            }
            saveState(); renderAll(); 
        }

        function saveState() { localStorage.setItem('proinvoice_v4', JSON.stringify(state)); }
        function loadState() { const s = localStorage.getItem('proinvoice_v4'); if(s) state = {...defaultState, ...JSON.parse(s)}; }

        // --- REMINDERS (INVOICE ONLY) ---
        function openReminderQR(id) {
            const record = state.savedInvoices.find(r => r.id === id);
            if (!record) return;
            const url = generateReminderQR(record);
            const container = document.getElementById(`qr-${id}`);
            if (!container) return;
            container.classList.toggle('hidden');
            if (!container.classList.contains('hidden')) {
                container.innerHTML = '';
                new QRCode(container, { text: url, width: 140, height: 140 });
            }
        }

        function sendSmartReminder(id) {
            const record = state.savedInvoices.find(r => r.id === id);
            if (!record) return;
            const message = generateReminderMessage(record);
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        function renderNudgeList() {
            const list = document.getElementById('nudge-modal-list');
            // PART 1: Restrict to Invoice Only
            const overdue = state.savedInvoices.filter(i => i.status === 'Unpaid');
            if (overdue.length === 0) { list.innerHTML = 'No overdue invoices.'; return; }
            list.innerHTML = overdue.map(item => `
                <div class="border rounded-xl p-4 bg-gray-50 space-y-3">
                    <div class="flex justify-between font-bold">
                        <span>#${item.invNum} - ${item.cName}</span>
                        <span class="text-red-600">${formatINR(item.total)}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="sendSmartReminder(${item.id})" class="bg-brand-600 text-white text-xs px-3 py-2 rounded-lg">PC Reminder</button>
                        <button onclick="openReminderQR(${item.id})" class="bg-gray-800 text-white text-xs px-3 py-2 rounded-lg">📱 QR Phone</button>
                    </div>
                    <div id="qr-${item.id}" class="hidden p-3 bg-white border rounded-lg"></div>
                </div>
            `).join('');
        }

        // --- PART 6: FIX MAIN WHATSAPP BUTTON ---
        function sendWhatsApp() {
            let message = "";
            const clientName = state.mode === 'invoice' ? (state.cName || "Client") : (state.contractClient || "Client");
            if (state.mode === 'invoice') {
                message = `Hi ${clientName}, Sharing invoice #${state.invNum} for ${formatINR(grandTotalToExport)}. Please review.`;
            } else {
                message = `Hi ${clientName}, Sharing our agreement. Please review and confirm.`;
            }
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        // --- PREVIEW (T&C + UPI FIX) ---
        function renderPreview() {
            const target = document.getElementById('invoice-target');
            if (state.mode === 'contract') { renderContractPreview(); return; }

            const sub = state.items.reduce((s, i) => s + (i.amount || 0), 0);
            grandTotalToExport = sub;

            let html = `<div class="p-12 h-full flex flex-col font-sans">
                <div class="flex justify-between border-b pb-8 mb-8">
                    <div><h1 class="text-3xl font-black">${state.fName || 'BRAND'}</h1></div>
                    <div class="text-right">
                        <h2 class="text-5xl font-black text-gray-100">INVOICE</h2>
                        <p class="font-bold">#${state.invNum}</p>
                        <p class="text-sm">Due: ${formatDate(state.dueDate)}</p>
                    </div>
                </div>
                <div class="mb-8">
                    <p class="text-xs font-bold text-gray-400">BILLED TO</p>
                    <h3 class="text-lg font-bold">${state.cName || 'Client Name'}</h3>
                    <p class="text-sm text-gray-600">${state.cAddress || ''}</p>
                </div>
                <table class="w-full mb-8">
                    <thead class="border-b-2"><tr><th class="text-left p-2">Item</th><th class="text-right p-2">Amount</th></tr></thead>
                    <tbody>${state.items.map(i => `<tr class="border-b"><td class="p-2">${i.desc}</td><td class="p-2 text-right">${formatINR(i.amount)}</td></tr>`).join('')}</tbody>
                </table>
                <div class="ml-auto w-48 text-right font-black text-2xl border-t-2 pt-4">${formatINR(sub)}</div>`;

            // PART 8: RESTORE UPI QR DISPLAY
            if (state.qrImage) {
                html += `
                <div style="margin-top:20px;text-align:center;border-top:1px solid #eee;padding-top:20px;">
                    <p style="font-size:10px;font-weight:bold;color:#666;margin-bottom:8px;">Scan to Pay via UPI</p>
                    <img src="${state.qrImage}" style="width:120px;height:120px;object-fit:contain;margin:0 auto;border:1px solid #f0f0f0;padding:5px;border-radius:8px;" />
                </div>`;
            }

            // PART 7: RESTORE TERMS & CONDITIONS
            html += `
                <div style="margin-top:20px;font-size:10px;color:#555;border-top:1px solid #eee;padding-top:20px;">
                    <p><strong>Terms & Conditions</strong></p>
                    <ul style="margin-top:5px;padding-left:15px;list-style-type:disc;">
                        <li>Payment is due as per agreed terms.</li>
                        <li>Late fee of ${state.lateFee || 0}% may apply on overdue invoices.</li>
                        <li>No refunds after project completion.</li>
                        <li>Ownership transfers only after full payment.</li>
                    </ul>
                </div>`;

            html += `<div class="mt-auto text-center opacity-20 text-[10px] py-4">Generated via ProInvoice SAAS</div></div>`;
            target.innerHTML = html;
        }

        function renderContractPreview() {
            const target = document.getElementById('invoice-target');
            const freelancer = state.contractFreelancer || state.fName || 'Freelancer';
            const client = state.contractClient || 'Client';
            target.innerHTML = `<div class="p-16 h-full font-serif">
                <h1 class="text-center text-3xl font-black border-b-4 border-black pb-8 mb-12">AGREEMENT</h1>
                <p class="mb-4">Between <strong>${freelancer}</strong> and <strong>${client}</strong>.</p>
                <div class="bg-gray-50 p-6 italic mb-8">${state.contractDesc || 'Project scope...'}</div>
                <p class="font-bold">Total: ${formatINR(state.contractAmount)}</p>
                <div class="mt-20 flex justify-between"><div class="border-t pt-2 w-48">Freelancer</div><div class="border-t pt-2 w-48">Client</div></div>
            </div>`;
        }

        // --- APP CONTROLS ---
        function setMode(m) { state.mode = m; updateState('mode', m); }
        function addItem() { state.items.push({id: Date.now(), desc: '', amount: 0}); renderAll(); }
        function handleQRUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => { 
                updateState('qrImage', ev.target.result);
                document.getElementById('qr-placeholder').classList.add('hidden');
                document.getElementById('qr-preview-container').classList.remove('hidden');
                document.getElementById('qr-preview-img').src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
        function saveToHistory() {
            const rec = { id: Date.now(), invNum: state.invNum, cName: state.mode==='invoice'?state.cName:state.contractClient, total: state.mode==='invoice'?grandTotalToExport:state.contractAmount, status: 'Unpaid', dueDate: state.dueDate };
            if(state.mode==='invoice') state.savedInvoices.unshift(rec); else state.savedContracts.unshift(rec);
            saveState();
            const t = document.getElementById('save-toast'); t.classList.add('opacity-100'); setTimeout(()=>t.classList.remove('opacity-100'), 2000);
        }
        function renderAll() { 
            renderPreview(); 
            const container = document.getElementById('share-qr-container');
            container.innerHTML = '';
            const isInv = state.mode === 'invoice';
            const url = new URL(window.location.href);
            url.searchParams.set('mobile','1');
            url.searchParams.set('mode', state.mode);
            url.searchParams.set('inv', isInv ? state.invNum : 'CONTRACT');
            new QRCode(container, { text: url.toString(), width: 120, height: 120 });
        }
        function toggleTracker() { document.getElementById('tracker-panel').classList.toggle('translate-x-full'); }
        function openNudgeModal() { document.getElementById('nudge-modal').classList.remove('hidden'); renderNudgeList(); }
        function closeNudgeModal() { document.getElementById('nudge-modal').classList.add('hidden'); }
        function clearData() { localStorage.removeItem('proinvoice_v4'); location.reload(); }

        window.onload = () => { loadState(); renderAll(); };
    </script>
</body>
</html>
